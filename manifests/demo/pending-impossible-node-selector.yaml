apiVersion: v1
kind: Pod
metadata:
  name: radar-demo-pending-impossible-selector
  namespace: default
  labels:
    app: radar-demo-pending
spec:
  nodeSelector:
    radar.demo/non-existent-node-class: "true"
  containers:
    - name: app
      image: nginx:1.27
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "100m"
          memory: "128Mi"

